name: Feature request
description: Suggest a new Caramel feature or syntax change.
title: "feat: "
labels:
  - enhancement
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Parser and syntax
        - Analyzer and types
        - CLI
        - Composer and plugins
        - Database and cache
        - VS Code extension
        - Build and releases
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem is currently impossible or inconvenient to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior and include a syntax example if useful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What other approaches have you considered?

  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility
      description: Would this proposal break the existing syntax, AST, or API?

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched open issues and found no similar proposal.
          required: true
