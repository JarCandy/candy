name: Bug report
description: Report a reproducible bug in Caramel.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. For vulnerabilities, use the private reporting form linked from SECURITY.md.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the bug and its impact.
      placeholder: What happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Caramel version
      description: Enter the version shown by the CLI or a commit SHA.
      placeholder: 26.7.18.1 or abc1234
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, architecture, and Go version.
      placeholder: macOS 15, arm64, Go 1.25.6
    validations:
      required: true

  - type: textarea
    id: source
    attributes:
      label: Minimal example
      description: Add the smallest Caramel source file that reproduces the bug.
      render: caramel
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Pass ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and diagnostics
      description: Include the complete command output with secrets and personal data removed.
      render: text
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched open issues and found no duplicate.
          required: true
        - label: This report contains no vulnerability details or sensitive data.
          required: true
